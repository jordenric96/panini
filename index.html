<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini WK 2026 Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-section">
        <h2>Inloggen / Registreren</h2>
        <input type="email" id="email" placeholder="E-mailadres" required>
        <input type="password" id="password" placeholder="Wachtwoord" required>
        <br><br>
        <button onclick="login()">Inloggen</button>
        <button onclick="register()">Registreren</button>
        <p id="auth-message"></p>
    </div>

    <div id="dashboard-section" style="display: none;">
        <h2>Welkom bij je collectie!</h2>
        <button onclick="logout()">Uitloggen</button>
        
        <div id="stats-container">
            </div>

        <div id="countries-container">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
