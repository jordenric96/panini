<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini WK 2026 Tracker</title>
   <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#4f46e5">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="profile-section" class="container">
        <h1 style="color: #4f46e5; font-size: 2.2rem; margin-bottom: 5px;">WK 2026 Tracker</h1>
        <p style="text-align: center; color: var(--text-secondary); font-weight: 700; margin-bottom: 25px;">Kies een profiel</p>
        <div class="profile-grid">
            <div class="profile-card" onclick="selectUser('Jorden')">Jorden</div>
            <div class="profile-card" onclick="selectUser('Wesley')">Wesley</div>
        </div>
    </div>

    <div id="dashboard-section" class="container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-text" style="text-align: left; margin: 0; font-size: 1.5rem;">Album van</h2>
            <button class="btn-secondary" onclick="logout()">Uitloggen</button>
        </div>
        
        <div class="total-card">
            <h3 style="margin: 0; font-size: 1rem; color: var(--text-secondary); text-align: left;">Totale Progressie</h3>
            <div class="progress-bar">
                <div id="total-progress" class="progress-fill"></div>
            </div>
            
            <div class="legend-container">
                <div class="legend-item">
                    <div class="legend-dot" style="background: var(--color-jorden);"></div>
                    <span>Jorden (<span id="legend-count-jorden">0</span>)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: var(--color-wesley);"></div>
                    <span>Wesley (<span id="legend-count-wesley">0</span>)</span>
                </div>
            </div>
        </div>

        <div class="countries-list" id="countries-container"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="modal-flag-wrapper">
                        <div class="flag-ring-1" id="flag-ring-1"></div>
                        <div class="flag-ring-2" id="flag-ring-2"></div>
                        <div class="flag-inner-circle" id="flag-inner-circle"></div>
                    </div>
                    <div>
                        <h2 id="modal-title" class="modal-title-text">Land</h2>
                        <span class="modal-subtitle">1x = Groen • 2x = Goud</span>
                    </div>
                </div>
                <button class="btn-secondary" style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 14px;" onclick="closeModal()">Terug</button>
            </div>
            
            <div class="sticker-grid" id="sticker-grid"></div>
        </div>
    </div>

    <script src="countries.js"></script>
    <script src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('App engine succesvol gestart!'))
                    .catch(err => console.log('App engine kon niet starten', err));
            });
        }
    </script>
</body>
</html>
