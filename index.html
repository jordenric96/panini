<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini WK 2026 Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="profile-section" class="container">
        <h1 style="color: #4f46e5; font-size: 2.2rem; margin-bottom: 10px;">WK 2026 Tracker</h1>
        <p style="text-align: center; color: var(--text-secondary); font-weight: 700; margin-bottom: 30px;">Kies een profiel om te starten</p>
        <div class="profile-grid">
            <div class="profile-card" onclick="selectUser('Jorden')">Jorden</div>
            <div class="profile-card" onclick="selectUser('Wesley')">Wesley</div>
        </div>
        <p id="fallback-notice" style="color: #f59e0b; text-align: center; margin-top: 20px; font-size: 0.85rem; display: none; font-weight: bold;">
            ⚠️ Supabase niet verbonden. Modus: Lokale Browser Opslag actief.
        </p>
    </div>

    <div id="dashboard-section" class="container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-text" style="text-align: left; margin: 0; font-size: 1.6rem; color: var(--text-primary);">Album van</h2>
            <button class="btn-secondary" onclick="logout()">Wissel Profiel</button>
        </div>
        
        <div class="total-card">
            <h3 style="margin: 0; font-size: 1.1rem; color: var(--text-primary); text-align: left;">Totale Album Progressie</h3>
            <div class="progress-bar">
                <div id="total-progress" class="progress-fill"></div>
            </div>
            <p id="total-text" style="font-weight: 800; margin: 0; text-align: left; color: #4f46e5; font-size: 1.05rem;">0 / 980 (0%)</p>
        </div>

        <div class="countries-list" id="countries-container"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="modal-flag-wrapper">
                        <div class="flag-ring-1" id="flag-ring-1"></div>
                        <div class="flag-ring-2" id="flag-ring-2"></div>
                        <div class="flag-inner-circle" id="flag-inner-circle"></div>
                    </div>
                    <div>
                        <h2 id="modal-title" style="margin: 0; text-align: left; font-size: 1.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.4);">Land</h2>
                        <span style="font-size: 0.85rem; opacity: 0.9; font-weight: 700;">1x = In Boek (Groen)  •  2x = Dubbel (Goud Shiny)</span>
                    </div>
                </div>
                <button class="btn-secondary" style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); backdrop-filter: blur(5px);" onclick="closeModal()">Terug</button>
            </div>
            
            <div class="sticker-grid" id="sticker-grid"></div>
        </div>
    </div>

    <script src="countries.js"></script>
    <script src="app.js"></script>
</body>
</html>
