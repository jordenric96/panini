<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini WK 2026 Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="profile-section" class="container">
        <h2>Wie ben je?</h2>
        <div class="profile-grid">
            <div class="profile-card" onclick="selectUser('Jorden')">Jorden</div>
            <div class="profile-card" onclick="selectUser('Wesley')">Wesley</div>
        </div>
        <p id="fallback-notice" style="color: #f59e0b; margin-top: 20px; font-size: 0.85rem; display: none;">
            ⚠️ Supabase niet gekoppeld. Modus: Lokale Browser Opslag actief.
        </p>
    </div>

    <div id="dashboard-section" class="container" style="display: none;">
        <div class="header-bar">
            <h2 id="welcome-text">Album</h2>
            <button class="btn-secondary" onclick="logout()">Wissel Profiel</button>
        </div>
        
        <div class="total-card">
            <h3 style="margin-bottom: 10px; font-size: 1.1rem;">Totale Progressie</h3>
            <div class="progress-bar" style="width: 100%; height: 10px; margin: 10px 0;">
                <div id="total-progress" class="progress-fill"></div>
            </div>
            <p id="total-text" style="margin: 0; font-size: 0.9rem; color: var(--text-secondary);">0 / 980 (0%)</p>
        </div>

        <div id="countries-container"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <button class="btn-secondary" style="float: right; background: #dc3545; color: white;" onclick="closeModal()">Sluiten</button>
            <h2 id="modal-title" style="margin-bottom: 5px;">Land</h2>
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin: 0 0 20px 0;">Klik 1x = Heb ik, 2x = Dubbel, 3x = Reset</p>
            <div class="sticker-grid" id="sticker-grid"></div>
        </div>
    </div>

    <script src="countries.js"></script>
    <script src="app.js"></script>
</body>
</html>
