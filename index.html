<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini WK 2026 Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="profile-section" class="container">
        <h2 style="text-align: center; color: var(--accent-2); font-size: 2rem;">Kies je profiel</h2>
        <div class="profile-grid">
            <div class="profile-card" onclick="selectUser('Jorden')">Jorden</div>
            <div class="profile-card" onclick="selectUser('Wesley')">Wesley</div>
        </div>
        <p id="fallback-notice" style="color: var(--color-double); text-align: center; margin-top: 20px; font-size: 0.85rem; display: none;">
            ⚠️ Supabase niet verbonden. Je speelt lokaal.
        </p>
    </div>

    <div id="dashboard-section" class="container" style="display: none;">
        <div class="header-bar">
            <h2 id="welcome-text">Mijn Album</h2>
            <div>
                <button class="btn btn-secondary" onclick="logout()">Wissel</button>
            </div>
        </div>
        
        <div class="total-card">
            <h3 style="color: var(--accent-1); margin-bottom: 5px;">Progressie</h3>
            <div class="progress-bar" style="width: 100%; height: 12px; margin: 12px 0;">
                <div id="total-progress" class="progress-fill"></div>
            </div>
            <p id="total-text" style="margin: 0; font-size: 1rem; color: var(--text-secondary); font-weight: bold;">0 / 980 (0%)</p>
            
            <button class="btn" style="margin-top: 15px; width: 100%; font-size: 1.1rem;" onclick="openTradeCenter()">🔁 Open Ruilcentrum</button>
        </div>

        <div id="countries-container"></div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="margin: 0;">Land</h2>
                <button class="btn btn-secondary" onclick="closeModal()">X</button>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin: 0;">1x = Heb ik (Groen), 2x = Dubbel (Oranje), 3x = Wis</p>
            <div class="sticker-grid" id="sticker-grid"></div>
        </div>
    </div>

    <div id="trade-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin: 0; color: var(--accent-1);">🔁 Ruilcentrum</h2>
                <button class="btn btn-secondary" onclick="closeTradeCenter()">X</button>
            </div>
            
            <div class="trade-list" id="trade-i-give">
                <h4>Wat ik aan <span id="trade-other-name-1"></span> kan geven:</h4>
                <div class="trade-badges" id="badges-i-give">Laden...</div>
            </div>

            <div class="trade-list" id="trade-i-get">
                <h4>Wat <span id="trade-other-name-2"></span> aan mij kan geven:</h4>
                <div class="trade-badges" id="badges-i-get">Laden...</div>
            </div>
        </div>
    </div>

    <script src="countries.js"></script>
    <script src="app.js"></script>
</body>
</html>
