<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WK 2026 Album</title>
    <link rel="stylesheet" href="design.css?v=14">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="profile-section" class="container">
        <h1>WK 2026 Album</h1>
        <div class="profile-grid">
            <div class="profile-card" onclick="selectUser('Lou')">Lou</div>
            <div class="profile-card" onclick="selectUser('Wesley')">Wesley</div>
            <div class="profile-card" onclick="selectUser('Oliver')">Oliver</div>
        </div>
    </div>

    <div id="dashboard-section" class="container" style="display: none;">
        <div class="header-box">
            <h2 id="welcome-text">Album</h2>
            <button class="btn-action" onclick="logout()">Uitloggen</button>
        </div>
        <div class="total-card"><h2 id="total-text">0/980</h2></div>
        
        <input type="text" id="search-bar" class="custom-input" placeholder="Zoek land..." onkeyup="renderDashboard()">
        <div class="quick-add-container">
            <input type="text" id="quick-add-input" class="custom-input" placeholder="Snel toevoegen (bijv. BEL 4)" onkeypress="handleQuickAdd(event)">
            <button class="btn-quick-add" onclick="processQuickAdd()">+</button>
        </div>
        <div class="countries-list" id="countries-container"></div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modal-title">Land</h2><button class="btn-action" onclick="closeModal()">✖</button></div>
            <div class="sticker-grid" id="sticker-grid"></div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script src="countries.js?v=14"></script>
    <script src="app.js?v=14"></script>
</body>
</html>
