<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini WK 2026 Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="profile-section" class="container">
        <h1>WK 2026 Tracker</h1>
        <div class="profile-grid">
            <div class="profile-card" onclick="selectUser('Jorden')">Jorden</div>
            <div class="profile-card" onclick="selectUser('Wesley')">Wesley</div>
        </div>
        <p id="fallback-notice" style="color: #f59e0b; text-align: center; margin-top: 20px; font-size: 0.8rem; display: none;">
            ⚠️ Supabase niet verbonden. Je speelt lokaal op dit toestel.
        </p>
    </div>

    <div id="dashboard-section" class="container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="welcome-text" style="text-align: left; margin: 0;">Album van</h2>
            <button class="btn-secondary" onclick="logout()">Wissel Profiel</button>
        </div>
        
        <div class="total-card">
            <h3>Totaal Album Progressie</h3>
            <div class="progress-bar">
                <div id="total-progress" class="progress-fill"></div>
            </div>
            <p id="total-text" style="font-weight: bold; margin: 0; color: var(--text-secondary);">0 / 980 (0%)</p>
        </div>

        <div class="countries-list" id="countries-container"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="modal-flag-wrapper">
                        <div class="flag-ring-1" id="flag-ring-1"></div>
                        <div class="flag-ring-2" id="flag-ring-2"></div>
                        <div class="flag-inner-circle" id="flag-inner-circle"></div>
                    </div>
                    <h2 id="modal-title" style="margin: 0; text-align: left;">Land</h2>
                </div>
                <button class="btn-secondary" style="background-color: #dc3545; color: white;" onclick="closeModal()">X Sluiten</button>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin: 0;">Klik 1x = Heb ik, 2x = Dubbel, 3x = Wis</p>
            <div class="sticker-grid" id="sticker-grid"></div>
        </div>
    </div>

    <script src="countries.js"></script>
    <script src="app.js"></script>
</body>
</html>
