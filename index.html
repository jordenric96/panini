<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panini WK 2026 Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=26">
</head>
<body>

    <div id="profile-section" class="container">
        <h1 style="color: #4f46e5; font-size: 2.2rem; margin-bottom: 5px;">WK 2026 Tracker</h1>
        <p style="text-align: center; color: var(--text-secondary); font-weight: 700; margin-bottom: 25px;">Kies een profiel</p>
        <div class="profile-grid">
            <div class="profile-card" onclick="selectUser('Lou & Noé')">Lou & Noé</div>
            <div class="profile-card" onclick="selectUser('Wesley')">Wesley</div>
            <div class="profile-card" onclick="selectUser('Oliver')">Oliver</div>
            <div class="profile-card" style="background: #f0f9ff; border-color: #e0f2fe; color: #0ea5e9;" onclick="selectUser('De Stapel')">De Stapel 📦</div>
        </div>
    </div>

    <div id="dashboard-section" class="container" style="display: none;">
        <div class="header-container">
            <h2 id="welcome-text">Album</h2>
            <div class="dashboard-actions">
                <button class="btn-action" onclick="openListCenter()" title="Digitale Lijsten">📋 Lijsten</button>
                <button class="btn-action" id="btn-trade" onclick="openTradeCenter()" title="Ruilcentrum">🔄 Ruil</button>
                <!-- NIEUW: De Verdeel knop voor De Stapel -->
                <button class="btn-action" id="btn-distribute" onclick="openDistributeCenter()" title="Verdeelcentrum" style="display: none; background: #0ea5e9; color: white;">📦 Verdeel</button>
                <button class="btn-action" onclick="printList()" title="Print Lijst">🖨️ Print</button>
                <button class="btn-action" onclick="openStatsCenter()" title="Statistieken">🏆</button>
                <button class="btn-action" onclick="logout()" title="Uitloggen">🚪</button>
            </div>
        </div>

        <div id="wesley-donation-container" style="display: none;">
            <button onclick="executeWesleyDonation()" class="btn-wesley-donate">dit is de Wesley doneert al zijn dubbele stickers aan Lou en Noé knop, Come on you mauves</button>
        </div>
        
        <div class="total-card" id="ranks-card-container">
            <h3 style="margin: 0 0 12px 0; font-size: 1.1rem; color: var(--text-primary); text-align: left; border-bottom: 2px dashed #e2e8f0; padding-bottom: 8px;">🏆 Klassement & Rangen</h3>
            <div id="ranks-container" class="ranks-container"></div>
        </div>

        <div class="search-container">
            <input type="text" id="search-bar" class="custom-input" placeholder="🔍 Zoek land (bijv. BEL of België)..." onkeyup="filterCountries()">
        </div>
        
        <div id="scanner-container" class="scanner-container">
            <video id="scanner-video" autoplay playsinline class="scanner-video"></video>
            <div id="scanner-status" class="scanner-status">Scanner voorbereiden...</div>
            <div class="scanner-guide">Plaats de code (bijv. BEL 4) in dit vak</div>
            <button class="btn-action btn-scanner-stop" onclick="toggleScanner()">✖ Sluiten</button>
        </div>

        <div class="quick-add-container">
            <button class="btn-action" style="min-width: 50px; background: #e2e8f0; font-size: 1.2rem;" onclick="toggleScanner()" title="Live Scanner">📷</button>
            <input type="text" id="quick-add-input" class="custom-input" placeholder="⚡ Typ of scan (bijv. BEL 4)" onkeypress="handleQuickAdd(event)">
            <button class="btn-quick-add" onclick="processQuickAdd()">+</button>
        </div>

        <div class="countries-list" id="countries-container"></div>
    </div>

    <!-- Modals -->
    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="modal-flag-wrapper">
                        <div class="flag-ring-1" id="flag-ring-1"></div>
                        <div class="flag-ring-2" id="flag-ring-2"></div>
                        <div class="flag-inner-circle" id="flag-inner-circle"></div>
                    </div>
                    <div>
                        <h2 id="modal-title" class="modal-title-text">Land</h2>
                        <span class="modal-subtitle" id="modal-subtitle-text">Bolletjes = Anderen</span>
                    </div>
                </div>
                <button class="btn-action" style="background: rgba(255,255,255,0.2); color: white;" onclick="closeModal()">✖</button>
            </div>
            <div class="sticker-grid" id="sticker-grid"></div>
        </div>
    </div>

    <!-- NIEUW: Verdeelcentrum Modal -->
    <div id="distribute-modal" class="modal-overlay">
        <div class="modal-content" style="background: var(--bg-main);">
            <div class="modal-header" style="background: white;">
                <h2 style="margin:0; font-size: 1.5rem;">📦 Verdeelcentrum</h2>
                <button class="btn-action" onclick="closeDistributeCenter()">✖</button>
            </div>
            <div class="trade-section" id="distribute-content" style="padding-top: 15px;"></div>
        </div>
    </div>

    <div id="list-modal" class="modal-overlay">
        <div class="modal-content" style="background: var(--bg-main);">
            <div class="modal-header" style="background: white; border-bottom-left-radius: 0; border-bottom-right-radius: 0; padding-bottom: 5px; margin-bottom: 0;">
                <h2 style="margin:0; font-size: 1.5rem;">📋 Inventaris</h2>
                <button class="btn-action" onclick="closeListCenter()">✖</button>
            </div>
            <div style="background: white; padding-bottom: 12px; border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);">
                <div class="list-tabs">
                    <div class="list-tab active" id="tab-doubles" onclick="setListTab('doubles')">Dubbels</div>
                    <div class="list-tab" id="tab-owned" onclick="setListTab('owned')">In Album</div>
                    <div class="list-tab" id="tab-missing" onclick="setListTab('missing')">Manco's</div>
                </div>
            </div>
            <div class="trade-section" id="list-content" style="padding-top: 15px;"></div>
        </div>
    </div>

    <div id="trade-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin:0; font-size: 1.5rem;">🔄 Ruilcentrum</h2>
                <button class="btn-action" onclick="closeTradeCenter()">✖</button>
            </div>
            <div class="trade-section" id="trade-content"></div>
        </div>
    </div>

    <div id="stats-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin:0; font-size: 1.5rem;">🏆 Trophy Room</h2>
                <button class="btn-action" onclick="closeStatsCenter()">✖</button>
            </div>
            <div class="trade-section" id="stats-content"></div>
        </div>
    </div>

    <div id="toast" class="toast">Bericht hier</div>
    <div id="print-area"></div>

    <script src="countries.js?v=26"></script>
    <script src="app.js?v=26"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error', err));
            });
        }
    </script>
</body>
</html>
